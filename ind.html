<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ULTRA PAC-MAN KERNEL</title>
    <style>
        :root { --neon-blue: #1919ff; --pac-yellow: #ffff00; }
        body { background: #050505; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }
        #ui-layer { width: 448px; display: flex; justify-content: space-between; padding: 10px; font-weight: bold; letter-spacing: 2px; }
        canvas { border: 4px solid var(--neon-blue); box-shadow: 0 0 25px var(--neon-blue); border-radius: 8px; image-rendering: pixelated; }
        .game-over { position: absolute; color: red; font-size: 3rem; display: none; text-shadow: 2px 2px #fff; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div>SCORE: <span id="val-score">0000</span></div>
        <div>LIVES: <span id="val-lives">3</span></div>
    </div>
    <canvas id="core-viewport" width="448" height="496"></canvas>
    <div id="msg-death" class="game-over">GAME OVER</div>

    <script src="engine-core.js"></script>
</body>
</html>
