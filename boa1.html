<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bem-vindo ao Meu Portfólio | Tech & Inovação</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Container principal com proporção de cores: 60% amarelo, 40% preto */
        .welcome-screen {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Camada amarela: 60% da altura */
        .yellow-layer {
            position: relative;
            height: 60%;
            width: 100%;
            background: linear-gradient(135deg, #FFD700 0%, #FFC107 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            z-index: 2;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        /* Camada preta: 40% da altura */
        .black-layer {
            position: relative;
            height: 40%;
            width: 100%;
            background: #0A0A0A;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            border-top: 1px solid rgba(255,215,0,0.3);
        }

        /* Conteúdo principal da área amarela */
        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 1.5rem;
            max-width: 800px;
            animation: fadeSlideUp 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        .hero-content h1 {
            font-size: clamp(2.4rem, 8vw, 4.8rem);
            font-weight: 800;
            color: #111;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.05);
        }

        .hero-content .highlight {
            background: #00000020;
            backdrop-filter: blur(2px);
            display: inline-block;
            padding: 0 0.2rem;
            border-radius: 16px;
        }

        .hero-content .tagline {
            font-size: clamp(1rem, 4vw, 1.4rem);
            font-weight: 500;
            color: #1e1e1e;
            margin-top: 0.8rem;
            margin-bottom: 1.8rem;
            opacity: 0.9;
        }

        .btn-portfolio {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #000;
            color: #FFD700;
            border: none;
            padding: 0.9rem 2.2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 15px 25px -8px rgba(0,0,0,0.3);
            font-family: inherit;
        }

        .btn-portfolio:hover {
            background: #1a1a1a;
            transform: translateY(-5px);
            box-shadow: 0 25px 30px -12px black;
            color: #FFE55C;
            gap: 16px;
        }

        .btn-portfolio:active {
            transform: translateY(2px);
        }

        /* Botão para ir para welcome.html */
        .btn-welcome {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #FFD700;
            color: #000;
            border: none;
            padding: 0.8rem 1.8rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.3);
            font-family: inherit;
            text-decoration: none;
            margin-top: 1rem;
        }

        .btn-welcome:hover {
            background: #FFE55C;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -8px rgba(0,0,0,0.4);
            gap: 14px;
        }

        .btn-welcome:active {
            transform: translateY(1px);
        }

        /* Área preta: apresenta informações e skills tech */
        .tech-info {
            position: relative;
            z-index: 10;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            padding: 1.5rem 2rem;
            max-width: 1000px;
            margin: 0 auto;
            animation: fadeSlideUp 0.9s 0.2s backwards;
        }

        .card-tech {
            background: rgba(255,255,240,0.05);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 0.8rem 1.8rem;
            border: 1px solid rgba(255,215,0,0.3);
            transition: all 0.25s;
            text-align: center;
            min-width: 130px;
        }

        .card-tech i {
            font-size: 2rem;
            color: #FFD700;
            display: block;
            margin-bottom: 8px;
        }

        .card-tech span {
            font-weight: 500;
            color: #f0f0f0;
            letter-spacing: 0.5px;
            font-size: 0.9rem;
        }

        .card-tech:hover {
            background: rgba(255,215,0,0.12);
            border-color: #FFD700;
            transform: translateY(-4px);
        }

        .welcome-message {
            font-size: 0.95rem;
            color: #ccc;
            margin-top: 1.2rem;
            text-align: center;
            width: 100%;
            border-top: 1px dashed #FFD70030;
            padding-top: 1rem;
        }

        .welcome-message p {
            display: inline-block;
            background: #00000055;
            border-radius: 40px;
            padding: 0.3rem 1.2rem;
            font-weight: 400;
        }

        /* Botão container para agrupar os dois botões */
        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Animações */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes floatParticle {
            0% { 
                transform: translateY(0px) translateX(0px); 
                opacity: 0; 
            }
            20% { 
                opacity: 0.6; 
            }
            80% { 
                opacity: 0.3; 
            }
            100% { 
                transform: translateY(-80px) translateX(20px); 
                opacity: 0; 
            }
        }

        /* Responsividade */
        @media (max-width: 680px) {
            .tech-info {
                gap: 1rem;
                padding: 1rem;
            }
            .card-tech {
                padding: 0.5rem 1rem;
                min-width: 100px;
            }
            .btn-portfolio, .btn-welcome {
                padding: 0.7rem 1.6rem;
                font-size: 0.9rem;
            }
            .button-group {
                gap: 0.8rem;
            }
        }

        /* efeito sutil de brilho nas bordas */
        .yellow-layer::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #FFD700, #000, #FFD700);
            z-index: 15;
        }

        /* Foco e acessibilidade */
        button:focus-visible, a:focus-visible {
            outline: 2px solid #FFD700;
            outline-offset: 3px;
        }

        /* Fundo tecnológico com padrões */
        .custom-tech-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(90deg, rgba(0,255,255,0.08) 0px, rgba(0,255,255,0.08) 2px, transparent 2px, transparent 8px),
                repeating-linear-gradient(0deg, rgba(255,215,0,0.1) 0px, rgba(255,215,0,0.1) 1px, transparent 1px, transparent 12px),
                radial-gradient(circle at 20% 40%, rgba(0,0,0,0.2) 0%, transparent 35%),
                repeating-linear-gradient(45deg, rgba(255,215,0,0.05) 0px, rgba(255,215,0,0.05) 2px, transparent 2px, transparent 8px);
            background-repeat: repeat, repeat, no-repeat, repeat;
            background-size: auto, auto, cover, auto;
            opacity: 0.7;
            pointer-events: none;
            z-index: 0;
        }

        /* Overlay de profundidade */
        .tech-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 40%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.25) 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* Código binário decorativo */
        .binary-bg {
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-family: monospace;
            font-size: 10px;
            color: rgba(0,0,0,0.3);
            pointer-events: none;
            white-space: pre;
            z-index: 5;
        }

        .binary-bg span {
            display: block;
            line-height: 1.2;
        }

        /* Toast de notificação */
        .tech-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            font-family: 'Poppins', sans-serif;
            animation: fadeSlideUp 0.3s ease-out;
        }
    </style>
    <!-- Ícones Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Fonte Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="welcome-screen">
        <!-- LAYER AMARELO 60% -->
        <div class="yellow-layer">
            <div class="custom-tech-bg"></div>
            <div class="tech-overlay"></div>
            <div class="binary-bg">
                <span>01000100 01100101 01110110</span>
                <span>01110100 01100101 01100011 01101000</span>
            </div>

            <div class="hero-content">
                <h1>Olá, mundo! 👋<br><span class="highlight">Bem-vindo(a)</span> ao meu universo</h1>
                <div class="tagline">
                    <i class="fas fa-code"></i>  Desenvolvedor Full-Stack & Criador de Soluções Tech  <i class="fas fa-microchip"></i>
                </div>
                <div class="button-group">
                    <button class="btn-portfolio" id="exploreBtn">
                        Explorar Portfólio <i class="fas fa-arrow-right"></i>
                    </button>
                    <a href="welcome.html" class="btn-welcome" id="welcomeBtn">
                        <i class="fas fa-door-open"></i> Ir para Welcome
                    </a>
                </div>
            </div>
        </div>

        <!-- LAYER PRETO 40% -->
        <div class="black-layer">
            <div class="custom-tech-bg" style="opacity: 0.4;"></div>
            <div class="tech-overlay" style="background: radial-gradient(circle at 70% 20%, rgba(255,215,0,0.05), transparent);"></div>
            
            <div class="tech-info">
                <div class="card-tech">
                    <i class="fab fa-react"></i>
                    <span>React & Next.js</span>
                </div>
                <div class="card-tech">
                    <i class="fab fa-node-js"></i>
                    <span>Node.js · API</span>
                </div>
                <div class="card-tech">
                    <i class="fas fa-database"></i>
                    <span>SQL / NoSQL</span>
                </div>
                <div class="card-tech">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Cloud & DevOps</span>
                </div>
                <div class="card-tech">
                    <i class="fas fa-mobile-alt"></i>
                    <span>UI/UX Responsivo</span>
                </div>
                <div class="welcome-message">
                    <p><i class="fas fa-crown"></i> Inovação, performance e design inteligente  <i class="fas fa-crown"></i></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const exploreBtn = document.getElementById('exploreBtn');
            
            // Função para criar notificação personalizada
            function createCustomToast(message, icon = '🚀') {
                const existingToast = document.querySelector('.tech-toast');
                if(existingToast) existingToast.remove();
                
                const toast = document.createElement('div');
                toast.className = 'tech-toast';
                toast.innerHTML = `
                    <div style="background: #1f1f1fcc; backdrop-filter: blur(12px); border-left: 5px solid #FFD700; border-radius: 20px; padding: 12px 24px; display: flex; align-items: center; gap: 14px; box-shadow: 0 20px 35px -12px black; color: white; font-weight: 500;">
                        <span style="font-size: 28px;">${icon}</span>
                        <span style="font-size: 1rem;">${message}</span>
                        <button id="closeToastBtn" style="background: none; border: none; color: #FFD700; font-size: 20px; cursor: pointer; margin-left: 8px;">&times;</button>
                    </div>
                `;
                document.body.appendChild(toast);
                
                const closeBtn = toast.querySelector('#closeToastBtn');
                if(closeBtn) {
                    closeBtn.addEventListener('click', () => toast.remove());
                }
                
                setTimeout(() => {
                    if(toast && toast.remove) toast.remove();
                }, 4000);
            }
            
            // Interação do botão explorar
            if(exploreBtn) {
                exploreBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    createCustomToast('✨ Portfólio em construção — Em breve mais projetos incríveis! ✨', '💻');
                    
                    // Efeito de clique
                    exploreBtn.style.transform = 'scale(0.97)';
                    setTimeout(() => { 
                        if(exploreBtn) exploreBtn.style.transform = ''; 
                    }, 150);
                    
                    // Efeito de brilho na camada amarela
                    const yellowLayer = document.querySelector('.yellow-layer');
                    if(yellowLayer) {
                        yellowLayer.style.transition = 'box-shadow 0.2s';
                        yellowLayer.style.boxShadow = '0 0 0 2px #FFD700, 0 0 0 5px rgba(0,0,0,0.2)';
                        setTimeout(() => { 
                            if(yellowLayer) yellowLayer.style.boxShadow = ''; 
                        }, 400);
                    }
                });
            }
            
            // Animação pulsante nos cards
            const cards = document.querySelectorAll('.card-tech');
            let index = 0;
            
            function pulseCard() {
                if(cards.length === 0) return;
                cards.forEach(c => c.style.transition = 'all 0.2s');
                if(cards[index]) {
                    cards[index].style.transform = 'scale(1.02)';
                    cards[index].style.borderColor = '#FFD700';
                    setTimeout(() => {
                        if(cards[index]) {
                            cards[index].style.transform = '';
                            cards[index].style.borderColor = '';
                        }
                    }, 400);
                }
                index = (index + 1) % cards.length;
            }
            
            setInterval(pulseCard, 1800);
            
            // Criar partículas flutuantes
            function createParticles() {
                const particleContainer = document.createElement('div');
                particleContainer.style.position = 'fixed';
                particleContainer.style.top = '0';
                particleContainer.style.left = '0';
                particleContainer.style.width = '100%';
                particleContainer.style.height = '100%';
                particleContainer.style.pointerEvents = 'none';
                particleContainer.style.zIndex = '999';
                document.body.appendChild(particleContainer);
                
                for(let i = 0; i < 40; i++) {
                    const particle = document.createElement('div');
                    const size = Math.random() * 4 + 2;
                    particle.style.position = 'absolute';
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    particle.style.background = `rgba(255, 215, 0, ${Math.random() * 0.4 + 0.1})`;
                    particle.style.borderRadius = '50%';
                    particle.style.left = `${Math.random() * 100}%`;
                    particle.style.top = `${Math.random() * 100}%`;
                    particle.style.opacity = Math.random() * 0.5;
                    particle.style.animation = `floatParticle ${Math.random() * 10 + 8}s infinite linear`;
                    particleContainer.appendChild(particle);
                }
            }
            
            createParticles();
            
            // Log no console
            console.log('✅ Tela de boas-vindas carregada — Design 60% amarelo e 40% preto + fundo tech');
            console.log('🔗 Botão "Ir para Welcome" redireciona para welcome.html');
        })();
    </script>
</body>
</html>
